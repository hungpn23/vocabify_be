name: nestjs-boilerplate

services:
  node:
    build:
      target: development
    extends:
      file: .docker/compose.base.yml
      service: node
    ports:
      - '${APP_PORT}:${APP_PORT}'
    volumes:
      - ${PWD}:/app
    depends_on:
      - db
      - redis
    networks:
      - boilerplate_network

  db:
    extends:
      file: .docker/compose.base.yml
      service: db
    ports:
      - '${DB_PORT}:${DB_PORT}'
    volumes:
      - ${PWD}/.docker/volumes/pg_data:/var/lib/postgresql/data
    networks:
      - boilerplate_network
    
  redis:
    extends:
      file: .docker/compose.base.yml
      service: redis
    ports:
      - '${REDIS_PORT}:${REDIS_PORT}'
    volumes:
      - ${PWD}/.docker/volumes/redis_data:/data
    command: ["redis-server", "--appendonly", "yes", "--dir", "/data"]
    networks:
      - boilerplate_network

volumes:
  pg_data:
  redis_data:

networks:
  boilerplate_network:
