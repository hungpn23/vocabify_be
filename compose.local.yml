name: nestjs-boilerplate

services:
  db:
    extends:
      file: .docker/compose.base.yml
      service: db
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - ${PWD}/.docker/volumes/pg_data:/var/lib/postgresql/data
    networks:
      - boilerplate_network
    
  redis:
    extends:
      file: .docker/compose.base.yml
      service: redis
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - ${PWD}/.docker/volumes/redis_data:/data
    command: ["redis-server", "--appendonly", "yes", "--dir", "/data"]
    networks:
      - boilerplate_network


volumes:
  pg_data:
  redis_data:

networks:
  boilerplate_network:
